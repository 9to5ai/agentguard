# OWASP Agentic Security Initiative (ASI) Top 10 — 2026
# Framework definition for AgentGuard scanner
# Reference: https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/

framework:
  id: owasp-asi-2026
  name: "OWASP Top 10 for Agentic Applications 2026"
  version: "1.0"
  url: "https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/"

controls:

  - id: ASI01
    name: "Agent Goal Hijack"
    description: "Protections against attackers altering agent objectives through malicious content"
    severity: critical
    checks:
      - id: ASI01-01
        name: "Prompt injection defence installed"
        check_type: skill_installed
        check_value: ["prompt-guard", "secureclaw"]
        remediation: "Install a prompt injection detection skill: clawhub install prompt-guard"
        board_impact: "The AI agent cannot detect when someone is trying to manipulate it. An attacker could embed hidden instructions in a document, email, or web page that cause the agent to leak confidential data, send unauthorised messages, or take actions on behalf of the organisation without anyone realising."
        business_risk: "Data breach, reputational damage, regulatory sanction"
        analogy: "Like having an employee who follows any instruction from anyone, including strangers, without questioning it."
        risk_likelihood: 4
        risk_impact: 5

      - id: ASI01-02
        name: "Group chat mention policy"
        check_type: config_path
        check_path: "channels.telegram.groups.*.requireMention"
        expected: true
        remediation: "Set requireMention: true for groups to prevent goal hijack via arbitrary messages"
        board_impact: "The agent reads and responds to every message in the group chat, not just ones directed at it. Any member of the group — or anyone who gains access to it — could give the agent instructions, potentially triggering actions like accessing files, browsing websites, or sending messages on behalf of the organisation."
        business_risk: "Unauthorised access, social engineering vector, loss of control"
        analogy: "Like giving every person in an open-plan office the authority to instruct your PA, not just you."
        risk_likelihood: 3
        risk_impact: 4

      - id: ASI01-03
        name: "DM allowlist configured"
        check_type: config_path
        check_path: "channels.telegram.dmPolicy"
        expected: "allowlist"
        remediation: "Set dmPolicy to allowlist and configure allowFrom with authorised user IDs"
        board_impact: "Without a sender allowlist, anyone who discovers the agent's contact details could send it instructions directly. This is the equivalent of an unlocked front door."
        business_risk: "Unauthorised agent access, data exfiltration"
        analogy: "Like publishing your PA's direct phone number on the internet with no caller screening."
        risk_likelihood: 3
        risk_impact: 4

  - id: ASI02
    name: "Tool Misuse and Exploitation"
    description: "Controls against agents using legitimate tools in unsafe ways"
    severity: high
    checks:
      - id: ASI02-01
        name: "Shell execution sandboxed"
        check_type: tool_policy
        check_value: "shell_sandboxed"
        remediation: "Run OpenClaw in a dedicated VM or container. Review tool_policy if available."
        board_impact: "The agent can run any system command on the machine it's hosted on — install software, read files, make network connections. While running in a VM limits the blast radius, there are no restrictions on what commands it can execute within that environment."
        business_risk: "System compromise, credential theft, lateral movement"
        analogy: "Like giving an employee admin access to a company laptop with no usage monitoring or restricted applications."
        risk_likelihood: 2
        risk_impact: 5

      - id: ASI02-02
        name: "Browser profile isolated"
        check_type: browser_profile
        check_value: "isolated_profile"
        remediation: "Create an isolated browser profile for agent use"
        board_impact: "If the agent shares a browser profile with a human user, it inherits all their logged-in sessions, cookies, and saved passwords. A compromised agent would have full access to every service the human is logged into."
        business_risk: "Session hijacking, credential theft, identity impersonation"
        analogy: "Like letting someone else use your laptop while you're still logged into everything."
        risk_likelihood: 2
        risk_impact: 5

      - id: ASI02-03
        name: "Dangerous node commands denied"
        check_type: config_path
        check_path: "gateway.nodes.denyCommands"
        expected: "non_empty_array"
        remediation: "Add denyCommands for camera.snap, screen.record, etc."
        board_impact: "Without command restrictions, the agent could potentially activate cameras, record screens, or access contact lists on connected devices. Even if the agent wouldn't do this intentionally, a prompt injection attack could trigger these actions."
        business_risk: "Privacy violation, surveillance risk, regulatory breach"
        analogy: "Like giving someone the keys to every room in the building when they only need access to the lobby."
        risk_likelihood: 2
        risk_impact: 4

  - id: ASI03
    name: "Identity and Privilege Abuse"
    description: "Controls for agent identity scope and least-privilege access"
    severity: critical
    checks:
      - id: ASI03-01
        name: "Gateway authentication enabled"
        check_type: config_path
        check_path: "gateway.auth.mode"
        expected: "token"
        remediation: "Set gateway.auth.mode to token with a strong auth token"
        board_impact: "Without authentication, anyone who can reach the agent's gateway (web interface) can control it — send commands, read data, modify configuration. This is the most basic security control."
        business_risk: "Complete agent takeover, data exfiltration, destructive actions"
        analogy: "Like leaving the server room door unlocked with a sign saying 'help yourself'."
        risk_likelihood: 3
        risk_impact: 5

      - id: ASI03-02
        name: "Gateway bound to loopback"
        check_type: config_path
        check_path: "gateway.bind"
        expected: "loopback"
        remediation: "Set gateway.bind to loopback to prevent network exposure"
        board_impact: "If the gateway listens on all network interfaces instead of just localhost, any device on the same network can attempt to connect. On a corporate or home network, this expands the attack surface significantly."
        business_risk: "Network-level agent exposure, remote exploitation"
        analogy: "Like putting your front door key under the doormat — anyone who knows where to look can get in."
        risk_likelihood: 2
        risk_impact: 5

      - id: ASI03-03
        name: "Telegram sender allowlist"
        check_type: config_path
        check_path: "channels.telegram.allowFrom"
        expected: "non_empty_array"
        remediation: "Configure allowFrom with authorised Telegram user IDs"
        board_impact: "Without a sender allowlist, the agent accepts instructions from any Telegram user who messages it. This is a direct path to agent compromise."
        business_risk: "Unauthorised command execution, social engineering"
        analogy: "Like setting up a company chatbot that follows orders from anyone who DMs it."
        risk_likelihood: 3
        risk_impact: 4

      - id: ASI03-04
        name: "Max concurrent sessions limited"
        check_type: config_path
        check_path: "agents.defaults.maxConcurrent"
        expected: "lte_10"
        remediation: "Set maxConcurrent to a reasonable limit (e.g. 4-8)"
        board_impact: "Without session limits, the agent could be overwhelmed by concurrent requests, either accidentally or through a deliberate denial-of-service attack. This consumes API credits and may cause unpredictable behaviour."
        business_risk: "Resource exhaustion, runaway costs, denial of service"
        analogy: "Like hiring one receptionist but telling them to handle unlimited phone calls simultaneously."
        risk_likelihood: 2
        risk_impact: 3

  - id: ASI04
    name: "Agentic Supply Chain Vulnerabilities"
    description: "Controls for vetting and monitoring installed skills and plugins"
    severity: high
    checks:
      - id: ASI04-01
        name: "Skills inventory documented"
        check_type: skill_count
        check_value: "documented"
        remediation: "Create a skills inventory documenting purpose and risk for each skill"
        board_impact: "The agent has numerous software extensions installed, but there is no formal register of what each one does, who built it, or what access it has. Any one of these could contain vulnerabilities or malicious code that the agent would execute with full privileges."
        business_risk: "Supply chain compromise, shadow functionality, unvetted third-party code"
        analogy: "Like installing dozens of browser extensions on a corporate machine without IT approval or review."
        risk_likelihood: 3
        risk_impact: 4

      - id: ASI04-02
        name: "Workspace skills reviewed"
        check_type: workspace_skills
        check_value: "present"
        remediation: "Audit all custom workspace skills for malicious patterns"
        board_impact: "Custom-built extensions are running that have not been through a formal security review. While they may have been created by the operator, there is no documented audit trail confirming they are free from vulnerabilities or unintended behaviours."
        business_risk: "Unaudited code with full agent privileges"
        analogy: "Like running homemade scripts on production systems without peer review."
        risk_likelihood: 2
        risk_impact: 4

      - id: ASI04-03
        name: "Security scanning skill installed"
        check_type: skill_installed
        check_value: ["secureclaw", "healthcheck"]
        remediation: "Install secureclaw for automated security auditing"
        board_impact: "Without a dedicated security scanning tool, the agent cannot self-audit for common vulnerabilities, misconfigurations, or malicious patterns in its own environment."
        business_risk: "Undetected vulnerabilities, no continuous security assurance"
        analogy: "Like running a warehouse without a fire alarm — you won't know there's a problem until it's too late."
        risk_likelihood: 2
        risk_impact: 3

  - id: ASI05
    name: "Unexpected Code Execution"
    description: "Controls against unsafe code generation and execution"
    severity: critical
    checks:
      - id: ASI05-01
        name: "Subagent execution bounded"
        check_type: config_path
        check_path: "agents.defaults.subagents.maxConcurrent"
        expected: "lte_10"
        remediation: "Set subagents.maxConcurrent to prevent runaway agent spawning"
        board_impact: "Without limits on sub-agent spawning, the agent could create an unbounded number of child processes. This could cascade into runaway API costs and system resource exhaustion."
        business_risk: "Runaway costs, system instability, cascading failures"
        analogy: "Like authorising an employee to hire unlimited contractors on the company credit card."
        risk_likelihood: 2
        risk_impact: 4

      - id: ASI05-02
        name: "Cron job timeouts configured"
        check_type: cron_timeouts
        check_value: "all_have_timeout"
        remediation: "Add timeoutSeconds to all cron job payloads to prevent runaway execution"
        board_impact: "Scheduled tasks without time limits could run indefinitely — consuming API credits, generating unintended outputs, or holding system resources. There is no automatic kill switch for these jobs."
        business_risk: "Runaway costs, resource exhaustion, uncontrolled autonomous behaviour"
        analogy: "Like approving a standing order with no expiry date and no spending cap."
        risk_likelihood: 3
        risk_impact: 3

  - id: ASI06
    name: "Memory and Context Poisoning"
    description: "Protections for persistent memory and context integrity"
    severity: high
    checks:
      - id: ASI06-01
        name: "Memory files backed up"
        check_type: git_tracked
        check_path: "memory/"
        remediation: "Ensure memory/ directory is tracked in git for integrity and rollback"
        board_impact: "The agent's memory files contain accumulated knowledge about the organisation, its people, and its operations. Without version control, a corrupted or poisoned memory file cannot be detected or rolled back."
        business_risk: "Context manipulation, persistent agent compromise, inability to recover"
        analogy: "Like keeping all your meeting notes in a shared doc with no edit history — anyone can change the record."
        risk_likelihood: 2
        risk_impact: 4

      - id: ASI06-02
        name: "Memory file count reasonable"
        check_type: file_count
        check_path: "memory/"
        expected: "lte_50"
        remediation: "Review and consolidate old memory files"
        board_impact: "Excessive memory accumulation increases the attack surface for context poisoning and makes it harder to audit what the agent 'knows'. Old memory files may contain outdated or sensitive information."
        business_risk: "Data accumulation risk, PII exposure, audit complexity"
        analogy: "Like never clearing out old filing cabinets — eventually nobody knows what's in them."
        risk_likelihood: 2
        risk_impact: 3

      - id: ASI06-03
        name: "Workspace git-tracked"
        check_type: git_repo
        check_path: "workspace"
        remediation: "Initialise git in the workspace to track all changes"
        board_impact: "Without version control, there is no record of what changed, when, or by whom in the agent's workspace. This makes incident investigation and rollback impossible."
        business_risk: "No change audit trail, inability to recover from incidents"
        analogy: "Like running a business with no accounting records."
        risk_likelihood: 2
        risk_impact: 4

  - id: ASI07
    name: "Insecure Inter-Agent Communication"
    description: "Security of communication between agents and subagents"
    severity: medium
    checks:
      - id: ASI07-01
        name: "Subagent limits configured"
        check_type: config_path
        check_path: "agents.defaults.subagents.maxConcurrent"
        expected: "lte_10"
        remediation: "Limit subagent concurrency to prevent cascade effects"
        board_impact: "Without concurrency limits on sub-agents, a single compromised or malfunctioning agent could spawn unlimited children, each with full access. This is how cascading failures and runaway costs occur."
        business_risk: "Cascading agent compromise, resource exhaustion"
        analogy: "Like giving every contractor the authority to hire their own contractors."
        risk_likelihood: 2
        risk_impact: 3

      - id: ASI07-02
        name: "Tailscale/network sharing off"
        check_type: config_path
        check_path: "gateway.tailscale.mode"
        expected: "off"
        remediation: "Keep tailscale.mode as off unless explicitly needed"
        board_impact: "If network sharing is enabled, the agent becomes accessible from other devices on the Tailscale network. This extends the attack surface beyond the local machine to any connected device."
        business_risk: "Remote agent access, expanded attack surface"
        analogy: "Like sharing your house keys with everyone on your street via a smart lock."
        risk_likelihood: 2
        risk_impact: 4

  - id: ASI08
    name: "Cascading Failures"
    description: "Resilience against single faults propagating across agent systems"
    severity: medium
    checks:
      - id: ASI08-01
        name: "Model fallbacks configured"
        check_type: config_path
        check_path: "agents.defaults.model.fallbacks"
        expected: "non_empty_array"
        remediation: "Configure model fallbacks for resilience"
        board_impact: "All agent operations depend on a single external AI provider. If that provider has an outage, changes its policies, or suspends the account, every automated function stops immediately with no failover."
        business_risk: "Single point of failure, total operational disruption"
        analogy: "Like running the entire business on one internet provider with no backup."
        risk_likelihood: 3
        risk_impact: 3

      - id: ASI08-02
        name: "Cron watchdog active"
        check_type: cron_exists
        check_value: "watchdog"
        remediation: "Create a cron watchdog job to monitor and auto-retry failed jobs"
        board_impact: "Without a watchdog, failed scheduled tasks will silently stay failed until someone manually notices. Critical automations (backups, monitoring, reporting) could be down for days without anyone knowing."
        business_risk: "Silent failures, missed SLAs, undetected outages"
        analogy: "Like having no smoke detector — you don't find out about the fire until you smell smoke."
        risk_likelihood: 3
        risk_impact: 3

      - id: ASI08-03
        name: "Compaction safeguards enabled"
        check_type: config_path
        check_path: "agents.defaults.compaction.mode"
        expected: "safeguard"
        remediation: "Set compaction.mode to safeguard to protect context"
        board_impact: "Context compaction reduces the agent's working memory to save costs. Without safeguards, important context could be lost mid-task, causing the agent to 'forget' what it was doing and produce incorrect or incomplete outputs."
        business_risk: "Context loss, incorrect outputs, degraded agent performance"
        analogy: "Like clearing someone's desk mid-project and expecting them to carry on from memory."
        risk_likelihood: 2
        risk_impact: 3

  - id: ASI09
    name: "Human-Agent Trust Exploitation"
    description: "Controls ensuring appropriate human oversight of agent actions"
    severity: high
    checks:
      - id: ASI09-01
        name: "Cron jobs use approval gates"
        check_type: cron_approval
        check_value: "external_actions_gated"
        remediation: "Ensure all external-posting cron jobs send drafts for approval before publishing"
        board_impact: "Scheduled tasks that publish content or send messages on timers operate autonomously. A subtle drift in the AI's interpretation, or a model update, could result in inappropriate or damaging communications going out under the organisation's name without human review."
        business_risk: "Reputational damage, unauthorised communications, regulatory breach"
        analogy: "Like giving an intern access to the company Twitter account with no review process."
        risk_likelihood: 2
        risk_impact: 4

      - id: ASI09-02
        name: "Command logging enabled"
        check_type: config_path
        check_path: "hooks.internal.entries.command-logger.enabled"
        expected: true
        remediation: "Enable the command-logger hook for audit trail"
        board_impact: "Without command logging, there is no record of what the agent did, when, or why. Incident response, compliance reporting, and forensic investigation all become impossible."
        business_risk: "No audit trail, regulatory non-compliance, inability to investigate incidents"
        analogy: "Like running a bank with no transaction records."
        risk_likelihood: 2
        risk_impact: 4

  - id: ASI10
    name: "Rogue Agents"
    description: "Controls against behavioral drift, scope creep, and unintended agent autonomy"
    severity: high
    checks:
      - id: ASI10-01
        name: "Cron job inventory manageable"
        check_type: cron_count
        expected: "lte_15"
        remediation: "Review all cron jobs periodically. Remove unused jobs."
        board_impact: "Each autonomous scheduled task is a potential vector for unintended behaviour. As the number grows, the operator's ability to review and understand what the agent is doing autonomously decreases. Scope creep in AI autonomy is a governance risk."
        business_risk: "Loss of oversight, autonomous scope creep, unmonitored actions"
        analogy: "Like delegating more and more decisions to an employee without ever checking what they're actually doing."
        risk_likelihood: 2
        risk_impact: 3

      - id: ASI10-02
        name: "Session scope configured"
        check_type: config_path
        check_path: "session.dmScope"
        expected: "per-channel-peer"
        remediation: "Set session.dmScope to per-channel-peer for isolation"
        board_impact: "Without session isolation, conversations from different users or channels could leak into each other. The agent might reference information from one context in another, creating data leakage between users."
        business_risk: "Cross-user data leakage, privacy violation"
        analogy: "Like a receptionist who accidentally tells one caller about another caller's business."
        risk_likelihood: 2
        risk_impact: 4

      - id: ASI10-03
        name: "Restart controls enabled"
        check_type: config_path
        check_path: "commands.restart"
        expected: true
        remediation: "Enable commands.restart for emergency shutdown/restart"
        board_impact: "Without restart controls, the only way to stop a misbehaving agent is to kill the process at the system level. This requires technical access and may not be available to the person who first notices the problem."
        business_risk: "Inability to emergency-stop agent, delayed incident response"
        analogy: "Like a car with no brakes — fine until you need to stop."
        risk_likelihood: 1
        risk_impact: 4

# Standing risks (always assessed regardless of check status)
standing_risks:
  - title: "Credential Exposure via Memory Files"
    category: "Data Protection"
    asi_ref: "ASI06"
    board_impact: "The agent accumulates information over time in persistent files. These files may contain sensitive data — API keys, personal information, business intelligence — that could be exposed if the agent is compromised or the files are inadequately protected."
    risk_likelihood: 3
    risk_impact: 4
    controls_present: "Git-tracked for integrity, automated backups"
    controls_missing: "No automated PII/credential scanning of memory files"

  - title: "Browser Session Hijack"
    category: "Identity & Access"
    asi_ref: "ASI03"
    board_impact: "The agent maintains logged-in sessions to services like LinkedIn and email. If the agent is compromised, the attacker inherits all of those active sessions — no passwords needed."
    risk_likelihood: 2
    risk_impact: 5
    controls_present: "Isolated browser profile, VM separation"
    controls_missing: "No session rotation policy, no access logging per browser action"

  - title: "Autonomous External Actions"
    category: "Human Oversight"
    asi_ref: "ASI09"
    board_impact: "The agent publishes content and sends messages on scheduled timers. A subtle drift in behaviour could result in inappropriate or damaging communications going out under the organisation's name."
    risk_likelihood: 2
    risk_impact: 4
    controls_present: "Approval gates on external-posting crons"
    controls_missing: "No automated content policy checks before posting"

  - title: "Model Provider Dependency"
    category: "Operational Resilience"
    asi_ref: "ASI08"
    board_impact: "All agent operations depend on a single external AI provider. A provider outage, policy change, or account suspension would halt every automated function immediately."
    risk_likelihood: 3
    risk_impact: 3
    controls_present: "Fallback models configured"
    controls_missing: "No local model fallback, no SLA monitoring"

  - title: "Shadow AI Governance Gap"
    category: "Governance"
    asi_ref: "ASI10"
    board_impact: "This AI agent operates outside the organisation's normal IT governance. There is no change management process, no approval workflow for new capabilities, and no scheduled governance review."
    risk_likelihood: 4
    risk_impact: 3
    controls_present: "Git-tracked workspace, command logging enabled"
    controls_missing: "No change approval workflow, no governance review schedule, no formal owner assignment"
